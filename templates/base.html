<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{% block meta_description %}{{ site_description }}{% endblock %}">
    <title>{% block title %}{{ site_name }}{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/site.css">
    <link rel="alternate" type="application/rss+xml" title="{{ site_name }}" href="/rss.xml">
    {% block canonical %}{% endblock %}
    <meta property="og:site_name" content="{{ site_name }}">
    <meta property="og:title" content="{% block og_title %}{{ site_name }}{% endblock %}">
    <meta property="og:description" content="{% block og_description %}{{ site_description }}{% endblock %}">
    <meta property="og:type" content="{% block og_type %}website{% endblock %}">
    {% block og_extra %}{% endblock %}
    <meta name="twitter:card" content="summary">
    {% block head_extra %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    <header class="site-header">
        <div class="wrap header-inner">
            <a class="brand" href="/">
                <span class="brand-mark" aria-hidden="true"></span>
                <span class="brand-name">{{ site_name }}</span>
            </a>
            <nav class="nav" aria-label="Primary">
                <a href="/">Feed</a>
                <a href="/home">Home</a>
                <a href="/blog">Blog</a>
                <a href="/blog/search">Search</a>
                <span class="nav-user">
                    {% block nav_user %}<a href="/admin/login">Sign in</a>{% endblock %}
                </span>
            </nav>
        </div>
    </header>

    <main class="wrap main">
        <div class="app-grid">
            <!-- 侧边栏移到左侧 (Sidebar moved to the left) -->
            {% block right_rail %}{% endblock %}
            <div class="main-col">
                {% block content %}{% endblock %}
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="wrap">
            <p>{{ site_description }}</p>
        </div>
    </footer>
</body>
</html>
