{% extends "base.html" %}

{% block title %}About - {{ site_name }}{% endblock %}

{% block content %}
<section class="page-heading">
    <p class="eyebrow">About</p>
    <h1>About {{ site_name }}</h1>
    <p>{{ site_description }}</p>
</section>

<section class="content narrow">
    <p>This is a minimal read-only Markdown blog. Admin editing, uploads, RSS, and sitemap are planned for the next milestones.</p>
</section>
{% endblock %}
